global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'docker-host'
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: 'ntpd-rs'
    metrics_path: /
    static_configs:
      - targets: ['ntpd-rs:9975']

  - job_name: caddy
    static_configs:
      - targets: ['caddy-vpn:2020']
