services:
  Alias_site:
    image: ghcr.io/mrchuw/image-carousel:main
    container_name: Image-Carousel
    # ports:
    #   - ${PORT:-5000}:5000
    environment:
      - ANALYTICS_URL=${ANALYTICS_URL:-}
      - ANALYTICS_UUID=${ANALYTICS_UUID:-}
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped
    networks:
      - caddy

networks:
  caddy:
    external: true