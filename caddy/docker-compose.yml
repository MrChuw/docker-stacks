---
services:
  caddy:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: caddy
  #  image: caddy:latest
  #  image: ghcr.io/caddybuilds/caddy-cloudflare:latest
  #  image: lucaslorentz/caddy-docker-proxy:latest
  #  network_mode: host
    cap_add:
      - NET_ADMIN
    ports:
      - 80:80
      - 443:443/tcp
      - 443:443/udp
      - ${AUTHORIZED_IP}:2020:2020
    environment:
        DOMAIN: ${DOMAIN}
        CADDY_INGRESS_NETWORKS: ${CADDY_INGRESS_NETWORKS}
        CADDY_DOCKER_CADDYFILE_PATH: ${CADDY_DOCKER_CADDYFILE_PATH}
        CLOUDFLARE_API_TOKEN: ${CLOUDFLARE_API_TOKEN}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./caddy_data:/data
      - ./Caddyfile:/etc/caddy/Caddyfile
      - ./shared:/shared
      - ./caddy_config:/config
      - ./caddy_logs:/var/log/caddy
    networks:
      - caddy
    dns:
      - 8.8.8.8
      - 1.1.1.1
    restart: unless-stopped

  loki:
    image: grafana/loki:3.6.0
    container_name: loki
    ports:
      - ${AUTHORIZED_IP}:3100:3100
    volumes:
      - ./loki_data:/loki
      - .:/mnt/config
    command: -config.file=/mnt/config/loki-config.yaml
    networks:
      - caddy
    restart: unless-stopped

  promtail:
    image: grafana/promtail:3.6.0
    container_name: promtail
    volumes:
      - .:/mnt/config
      - ./caddy_logs:/var/log/caddy:ro
    command: -config.file=/mnt/config/promtail-config.yaml
    networks:
      - caddy
    depends_on:
      - loki
    restart: unless-stopped


networks:
  caddy:
    external: true
