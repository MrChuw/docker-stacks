name: Build by Tag
on:
  push:
    tags:
      - '*/v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read

    steps:
      - name: Extract Service Name and Version
        id: info
        run: |
          TAG=${{ github.ref_name }}
          SERVICE=$(echo $TAG | cut -d'/' -f1)
          VERSION=$(echo $TAG | cut -d'/' -f2 | sed 's/^v//')

          echo "service_name=$SERVICE" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: ./${{ steps.info.outputs.service_name }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ steps.info.outputs.service_name }}:latest
            ghcr.io/${{ github.repository_owner }}/${{ steps.info.outputs.service_name }}:${{ steps.info.outputs.version }}

          cache-from: type=gha
          cache-to: type=gha,mode=max



